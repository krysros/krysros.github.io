[project]
site_name = "Krystian Rosiński"
site_url = "https://krysros.github.io/"
copyright = "Copyright &copy; 2026 Krystian Rosiński"
nav = [
    {"Home" = "index.md"},
    {"Projects" = "projects.md"},
    {"Papers" = "papers.md"},
    {"Slides" = "slides.md"},
    {"Conferences" = "conferences.md"},
]

[project.theme]
font.text = "IBM Plex Sans"
font.code = "IBM Plex Mono"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/krystian-rosinski/"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/krysros"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]
