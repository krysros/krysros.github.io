site_name: Krystian Rosiński
site_url: https://krysros.github.io/
nav:
  - Home: index.md
  - Projects: projects.md
  - Papers: papers.md
  - Slides: slides.md
  - Conferences: conferences.md
theme:
  name: material
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
copyright: Copyright &copy; 2026 Krystian Rosiński
extra:
  generator: false
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/krystian-rosinski/
    - icon: fontawesome/brands/github
      link: https://github.com/krysros

markdown_extensions:
  - attr_list
  - md_in_html